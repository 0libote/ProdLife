name: Release Obsidian plugin

on:
  push:
    tags: ["*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun ci
      - run: bun run check
      - name: Verify tag matches manifest
        run: test "${GITHUB_REF_NAME}" = "$(bun -e 'console.log(require("./manifest.json").version)')"
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --generate-notes main.js manifest.json styles.css
