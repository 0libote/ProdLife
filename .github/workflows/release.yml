name: Release Obsidian plugin

on:
  push:
    tags: ["*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Verify tag matches manifest
        run: test "${GITHUB_REF_NAME}" = "$(node -p 'require("./manifest.json").version')"
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --generate-notes main.js manifest.json styles.css

