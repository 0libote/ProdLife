name: Check diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun ci
      - name: Capture check output
        run: bun run check > check.log 2>&1 || true
      - uses: actions/upload-artifact@v7
        with:
          name: check-log
          path: check.log
